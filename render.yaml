databases:
  - name: fbs-group40-db
    plan: free
    databaseName: fbs_group40
    user: fbs_admin

services:
  - type: web
    name: fbs-group40
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT "app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fbs-group40-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: PAYFAST_MERCHANT_ID
        sync: false
      - key: PAYFAST_MERCHANT_KEY
        sync: false
      - key: PAYFAST_URL
        sync: false
